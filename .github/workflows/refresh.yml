# Periodic refresh — pings the deployed dashboard so the cache revalidates on a
# schedule rather than only on page load (Level 4: GitHub Actions / cron).
# Set the repo variable DASHBOARD_URL to your deployed base URL (e.g. https://app.onrender.com).
# Settings → Secrets and variables → Actions → Variables → New repository variable.
name: refresh-cache

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min (GitHub may delay scheduled runs under load)
  workflow_dispatch: {}

# This job calls an external URL and needs nothing from the repo — least privilege.
permissions: {}

# Don't let a slow cold-start run overlap with the next scheduled run.
concurrency:
  group: refresh-cache
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Warm the cache
        env:
          BASE: ${{ vars.DASHBOARD_URL }}
        run: |
          set -euo pipefail
          if [ -z "${BASE:-}" ]; then
            echo "::warning::DASHBOARD_URL repo variable is not set — nothing to refresh."
            exit 0
          fi
          # Tolerate a trailing slash on the configured URL.
          BASE="${BASE%/}"

          # Free hosts (e.g. Render) sleep when idle; the first hit cold-starts in ~30-60s.
          # --retry handles the wake-up; --max-time caps each attempt.
          echo "Pinging $BASE ..."
          curl -fsS --retry 5 --retry-all-errors --retry-delay 10 --max-time 90 \
            "$BASE/api/health"
          echo
          curl -fsS --retry 5 --retry-all-errors --retry-delay 10 --max-time 120 \
            -o /dev/null "$BASE/api/sources"
          echo "sources refreshed"
